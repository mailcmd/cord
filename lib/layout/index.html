<html>

                do: "<link rel='stylesheet' type='text/css' href='@#{css}'>") |> Enum.join("\n")}
  <style>
    nocscript[cord-id] {

    }

    "<script type='text/javascript' src='@#{js}'></script>"
  end |> Enum.join("\n")}
</body>

</html>
