<cord-load-templates>
  @templates/header.dhtml
  @templates/options.dhtml
  @templates/login.dhtml
  @templates/loading.dhtml
</cord-load-templates>

<cord-container cord-id="header" cord-tpl-ref="tpl-header"></cord-container>

<main cord-id="main">
  <div id="box-board" class="main-container">
    :foreach box in alerts :do
    <div class="alert-box" style="background-color: ${box.color};">
      ${box.name}
    </div>
    :endforeach
  </div>
  <div id="map-board" class="main-container h-100" :visible="${map_visible}"></div>
</main>

<cord-container cord-id="login" cord-tpl-ref="tpl-login"></cord-container>
<cord-container cord-id="loading" cord-tpl-ref="tpl-loading"></cord-container>
<cord-container cord-id="options" cord-tpl-ref="tpl-options"></cord-container>

<footer></footer>
